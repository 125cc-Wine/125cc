<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#1c1917"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Wine Bar · Carta de Vinos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#f5f0ea;--card:#fffdf9;--border:#e8e0d4;--text:#1a1510;--muted:#7a6e62;
      --dark:#1c1917;--dark2:#292524;--dark3:#3c3835;--dark-muted:#78716c;
      --dark-text:#f5f5f4;--dark-sub:#a8a29e;--accent:#c8463a;
      --tinto:#991b1b;--blanco:#92400e;--rosado:#9f1239;--naranja:#b45309;
    }
    html,body{height:100%}
    body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);overscroll-behavior:none}
    .app{display:flex;flex-direction:column;min-height:100vh;max-width:430px;margin:0 auto;background:var(--bg)}

    /* Header */
    .header{background:var(--dark);padding:52px 20px 20px}
    .eyebrow{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--dark-muted);margin-bottom:4px}
    .header h1{font-family:'Playfair Display',serif;font-size:42px;font-weight:600;color:var(--dark-text);line-height:1;letter-spacing:-.02em}
    .header h1 span{color:var(--accent)}
    .header p{margin-top:8px;font-size:13px;color:var(--dark-sub);line-height:1.55}

    /* Map */
    .map-section{background:var(--dark);padding:16px 16px 18px}
    .map-section h2{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--dark-text);margin-bottom:10px}
    .map-canvas{background:#f4efe7;border-radius:16px;position:relative;height:260px;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none}
    .map-axis-h{position:absolute;top:50%;left:6%;right:6%;height:.5px;background:rgba(100,80,60,.28);pointer-events:none}
    .map-axis-v{position:absolute;left:50%;top:10%;bottom:8%;width:.5px;background:rgba(100,80,60,.28);pointer-events:none}
    .map-label{position:absolute;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:#78716c;pointer-events:none;font-family:'DM Sans',sans-serif}
    .map-watermark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:rgba(120,100,80,.09);font-weight:600;pointer-events:none}
    .wine-pin{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:2}
    .wine-pin:active{z-index:10}
    .copa-icon{display:block;transition:transform .12s}
    .wine-pin:active .copa-icon{transform:scale(1.2)}
    .pin-tooltip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#fff;border-radius:10px;padding:7px 11px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:50;border:.5px solid var(--border);box-shadow:0 4px 14px rgba(0,0,0,.12)}
    .pin-tooltip.show{opacity:1}
    .pin-tooltip::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#fff}
    .pt-name{font-size:12px;font-weight:500;color:var(--text);line-height:1.2}
    .pt-price{font-size:11px;color:var(--muted);margin-top:2px}
    .legend-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
    .legend-pill{display:flex;align-items:center;gap:5px;background:var(--dark2);border:.5px solid var(--dark3);border-radius:20px;padding:4px 11px;font-size:11px;color:#d6d3d1}
    .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

    /* Tabs */
    .tab-bar{display:flex;background:var(--card);border-bottom:.5px solid var(--border);position:sticky;top:0;z-index:100;overflow-x:auto}
    .tab-bar::-webkit-scrollbar{display:none}
    .tab-btn{flex:1;min-width:60px;padding:13px 6px;text-align:center;font-size:12px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;white-space:nowrap}
    .tab-btn.active{color:var(--text);border-bottom-color:var(--text)}
    .tab-content{display:none;padding:16px;padding-bottom:40px}
    .tab-content.active{display:block}
    .section-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;margin-top:2px}

    /* Wine list */
    .wine-card{background:var(--card);border:.5px solid var(--border);border-radius:14px;padding:12px 13px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:border-color .15s,background .15s;position:relative}
    .wine-card.active{border-color:var(--text);background:#f5f0ea}
    .wc-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0;margin-top:2px}
    .wc-info{flex:1;min-width:0}
    .wc-name{font-size:13px;font-weight:500;color:var(--text)}
    .wc-sub{font-size:11px;color:var(--muted);margin-top:2px}
    .wc-price{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap}
    .wc-star{position:absolute;top:10px;right:12px;font-size:10px;color:var(--accent);font-weight:600;letter-spacing:.05em}

    /* Ficha */
    .ficha-card{background:var(--card);border:.5px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
    .ficha-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:10px}
    .ficha-tipo-badge{border-radius:20px;padding:3px 12px;font-size:11px;font-weight:500;color:#fff;white-space:nowrap;flex-shrink:0}
    .ficha-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--text);line-height:1.1}
    .ficha-winery{font-size:12px;color:var(--muted);margin-top:3px}
    .ficha-note{background:var(--bg);border-radius:10px;padding:11px 13px;font-size:13px;color:var(--text);font-style:italic;line-height:1.65;margin-bottom:13px}
    .ficha-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px}
    .ficha-item{background:var(--bg);border:.5px solid var(--border);border-radius:10px;padding:10px 12px}
    .fi-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
    .fi-val{font-size:12px;font-weight:500;color:var(--text)}
    .ficha-placeholder{text-align:center;padding:48px 0;color:var(--muted);font-size:13px;line-height:1.7}

    /* Maridaje */
    .maridaje-section{margin-bottom:13px}
    .maridaje-title{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    .maridaje-pills{display:flex;flex-wrap:wrap;gap:6px}
    .maridaje-pill{display:flex;align-items:center;gap:5px;background:var(--bg);border:.5px solid var(--border);border-radius:20px;padding:5px 11px;font-size:12px;color:var(--text);font-weight:500}
    .maridaje-icon{font-size:13px}

    /* Perfil de sabor */
    .perfil-section{margin-bottom:13px}
    .perfil-title{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    .perfil-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
    .perfil-label{font-size:11px;color:var(--muted);width:56px;flex-shrink:0}
    .perfil-bar-bg{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
    .perfil-bar-fill{height:100%;border-radius:2px;background:var(--text);transition:width .3s}
    .perfil-val{font-size:10px;color:var(--muted);width:16px;text-align:right;flex-shrink:0}

    /* Bodega info */
    .bodega-section{background:var(--dark);border-radius:12px;padding:13px 14px;margin-bottom:0}
    .bodega-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--dark-muted);margin-bottom:5px}
    .bodega-text{font-size:12px;color:var(--dark-sub);line-height:1.65}

    /* Charcutería */
    .charc-item{background:var(--card);border:.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .charc-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
    .charc-detail{font-size:11px;color:var(--muted)}
    .charc-price{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap}

    /* ── SOMMELIER ── */
    .somm-intro{background:var(--dark);border-radius:16px;padding:20px;margin-bottom:16px;text-align:center}
    .somm-intro h3{font-family:'Playfair Display',serif;font-size:22px;color:var(--dark-text);margin-bottom:6px}
    .somm-intro p{font-size:13px;color:var(--dark-sub);line-height:1.5}
    .somm-start-btn{margin-top:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:12px 28px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%}

    .somm-step{display:none}
    .somm-step.active{display:block}
    .somm-question{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);margin-bottom:6px;line-height:1.3}
    .somm-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
    .somm-options{display:flex;flex-direction:column;gap:8px}
    .somm-opt{background:var(--card);border:.5px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px}
    .somm-opt:active,.somm-opt.selected{background:#f0ebe3;border-color:var(--text)}
    .somm-opt-icon{font-size:20px;flex-shrink:0}
    .somm-opt-text{font-size:14px;font-weight:500;color:var(--text)}
    .somm-opt-sub{font-size:12px;color:var(--muted);margin-top:2px}

    .somm-progress{display:flex;gap:4px;margin-bottom:18px}
    .somm-dot{height:3px;flex:1;border-radius:2px;background:var(--border);transition:background .2s}
    .somm-dot.done{background:var(--text)}
    .somm-dot.active{background:var(--accent)}

    .somm-results{display:none}
    .somm-results h3{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);margin-bottom:4px}
    .somm-results p{font-size:13px;color:var(--muted);margin-bottom:16px}
    .somm-result-card{background:var(--card);border:.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
    .somm-result-card:active{border-color:var(--text)}
    .src-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
    .src-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
    .src-name{font-size:14px;font-weight:500;color:var(--text);line-height:1.2}
    .src-why{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
    .src-price{font-size:13px;font-weight:600;color:var(--text);margin-top:8px}
    .src-maridaje{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
    .src-pill{background:var(--bg);border:.5px solid var(--border);border-radius:20px;padding:3px 9px;font-size:11px;color:var(--text)}
    .somm-restart{background:transparent;border:.5px solid var(--border);border-radius:10px;padding:11px;font-size:13px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;margin-top:4px}

    /* Botón comprar */
    .comprar-btn{
      display:flex;align-items:center;justify-content:center;gap:8px;
      margin-top:13px;padding:14px;width:100%;
      background:var(--accent);color:#fff;
      border-radius:12px;font-size:14px;font-weight:500;
      text-decoration:none;font-family:'DM Sans',sans-serif;
      transition:opacity .15s;
    }
    .comprar-btn:active{opacity:.85;}

    /* Footer */
    .footer{background:var(--dark);padding:20px;text-align:center}
    .footer p{font-size:11px;color:var(--dark-muted);line-height:1.8}
    .footer strong{color:var(--dark-sub)}

    /* Loading */
    #loading{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .4s}
    #loading h2{font-family:'Playfair Display',serif;font-size:36px;color:var(--dark-text)}
    #loading h2 span{color:var(--accent)}
    #loading p{font-size:12px;color:var(--dark-muted);margin-top:8px}
    #loading.hidden{opacity:0;pointer-events:none}
  </style>
</head>
<body>

<div id="loading">
  <h2>125<span>cc</span></h2>
  <p>Cargando carta…</p>
</div>

<div class="app" id="app" style="display:none">

  <div class="header">
    <div class="eyebrow">Wine Bar</div>
    <h1 id="titulo">125<span>cc</span></h1>
    <p id="descripcion"></p>
  </div>

  <div class="map-section">
    <div class="eyebrow" style="color:var(--dark-muted);margin-bottom:4px">Wine map</div>
    <h2>Mapa del vino</h2>
    <div class="map-canvas" id="mapCanvas">
      <div class="map-watermark" id="mapWatermark"></div>
      <div class="map-axis-h"></div>
      <div class="map-axis-v"></div>
      <div class="map-label" style="left:50%;top:5%;transform:translateX(-50%)">Potente</div>
      <div class="map-label" style="left:50%;bottom:3%;transform:translateX(-50%)">Ligero</div>
      <div class="map-label" style="left:2%;top:50%;transform:translateY(-50%)">Fresco</div>
      <div class="map-label" style="right:1%;top:50%;transform:translateY(-50%)">Maduro</div>
      <div id="mapDots"></div>
    </div>
    <div class="legend-row">
      <div class="legend-pill"><div class="legend-dot" style="background:var(--tinto)"></div>Tinto</div>
      <div class="legend-pill"><div class="legend-dot" style="background:var(--blanco)"></div>Blanco</div>
      <div class="legend-pill"><div class="legend-dot" style="background:var(--rosado)"></div>Rosado</div>
      <div class="legend-pill"><div class="legend-dot" style="background:var(--naranja)"></div>Naranja</div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('carta',this)">Carta</button>
    <button class="tab-btn" onclick="showTab('ficha',this)">Ficha</button>
    <button class="tab-btn" onclick="showTab('sommelier',this)">Sommelier</button>
    <button class="tab-btn" onclick="showTab('charc',this)">Tabla</button>
  </div>

  <!-- CARTA -->
  <div class="tab-content active" id="tab-carta">
    <div class="section-title">Carta por copa</div>
    <div id="wineList"></div>
  </div>

  <!-- FICHA -->
  <div class="tab-content" id="tab-ficha">
    <div id="fichaContent">
      <div class="ficha-placeholder">
        <div style="font-size:32px;margin-bottom:8px">🍷</div>
        Tocá una copita en el mapa<br>o un vino de la carta<br>para ver su ficha completa.
      </div>
    </div>
  </div>

  <!-- SOMMELIER -->
  <div class="tab-content" id="tab-sommelier">
    <div id="sommContent"></div>
  </div>

  <!-- CHARCUTERÍA -->
  <div class="tab-content" id="tab-charc">
    <div class="section-title">Charcutería</div>
    <div id="charcList"></div>
  </div>

  <div class="footer">
    <p id="footerInfo"></p>
  </div>

</div>

<script>
const TYPE_COLOR={Tinto:"#991b1b",Blanco:"#92400e",Rosado:"#9f1239",Naranja:"#b45309"};
const MARIDAJE_ICON={"carnes rojas":"🥩","quesos duros":"🧀","quesos blandos":"🧀","jamón crudo":"🍖","tabla":"🪵","fiambres":"🥓","salmón":"🐟","mortadela":"🥩","aceitunas":"🫒","panera":"🍞","salame":"🥩"};

let wines=[], selectedId=null;

fetch('./vinos.json')
  .then(r=>r.json())
  .then(data=>{
    wines=data.vinos;
    document.getElementById('titulo').innerHTML=data.bar.subtitulo
      ?`${data.bar.nombre} <span>${data.bar.subtitulo}</span>`
      :data.bar.nombre;
    document.getElementById('descripcion').textContent=data.bar.descripcion;
    document.getElementById('mapWatermark').textContent=`${data.bar.nombre} · ${data.bar.subtitulo||''}`;
    const parts=[data.bar.instagram,data.bar.direccion].filter(Boolean);
    document.getElementById('footerInfo').innerHTML=parts.map(p=>`<strong>${p}</strong>`).join(' &nbsp;·&nbsp; ');
    buildMap(); renderWineList(); renderCharc(data.charcuteria); initSommelier();
    setTimeout(()=>{
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('app').style.display='flex';
    },300);
  })
  .catch(()=>{
    document.getElementById('loading').innerHTML='<p style="color:#f87171;font-size:14px;padding:20px;text-align:center">Error cargando el menú.<br>Verificá tu conexión.</p>';
  });

/* ── MAP ── */
function buildMap(){
  const c=document.getElementById('mapDots');
  c.innerHTML='';
  wines.forEach(w=>{
    const left=50+w.x*0.4, top=50-w.y*0.36;
    const color=TYPE_COLOR[w.tipo]||'#888';
    const isSel=w.id===selectedId, size=isSel?22:17;
    const pin=document.createElement('div');
    pin.className='wine-pin';
    pin.style.cssText=`left:${left}%;top:${top}%;z-index:${isSel?20:2}`;
    pin.innerHTML=`${copaSVG(color,size)}<div class="pin-tooltip${isSel?' show':''}" id="tip-${w.id}"><div class="pt-name">${w.nombre}</div><div class="pt-price">${w.precio} · ${w.tipo}</div></div>`;
    pin.addEventListener('click',e=>{
      e.stopPropagation();
      selectedId=(selectedId===w.id)?null:w.id;
      buildMap(); renderWineList();
      if(selectedId){ renderFicha(wines.find(x=>x.id===selectedId)); showTab('ficha',document.querySelectorAll('.tab-btn')[1]); }
    });
    c.appendChild(pin);
  });
}
document.addEventListener('click',()=>{ if(selectedId!==null){selectedId=null;buildMap();renderWineList();} });
function copaSVG(color,size){
  return `<svg class="copa-icon" width="${size}" height="${size}" viewBox="0 0 20 24" fill="none"><path d="M4 2 C4 2 2 8 2 11 C2 15 5.5 17.5 9 18 L9 21 L6 21 L6 23 L14 23 L14 21 L11 21 L11 18 C14.5 17.5 18 15 18 11 C18 8 16 2 16 2 Z" fill="${color}" stroke="rgba(255,255,255,0.35)" stroke-width="0.8"/></svg>`;
}

/* ── WINE LIST ── */
function renderWineList(){
  document.getElementById('wineList').innerHTML=wines.map(w=>`
    <div class="wine-card${w.id===selectedId?' active':''}" onclick="selectWine(${w.id})">
      ${w.destacado?'<div class="wc-star">★ Destacado</div>':''}
      <div class="wc-badge" style="background:${TYPE_COLOR[w.tipo]||'#888'}">${w.id}</div>
      <div class="wc-info"><div class="wc-name">${w.nombre}</div><div class="wc-sub">${w.bodega} · ${w.tipo}</div></div>
      <div class="wc-price">${w.precio}</div>
    </div>`).join('');
}
function selectWine(id){
  selectedId=id; buildMap(); renderWineList();
  renderFicha(wines.find(w=>w.id===id));
  showTab('ficha',document.querySelectorAll('.tab-btn')[1]);
}

/* ── FICHA ── */
function renderFicha(w){
  if(!w){
    document.getElementById('fichaContent').innerHTML=`<div class="ficha-placeholder"><div style="font-size:32px;margin-bottom:8px">🍷</div>Tocá una copita en el mapa<br>o un vino de la carta.</div>`;
    return;
  }
  const color=TYPE_COLOR[w.tipo]||'#888';
  const maridajePills=(w.maridaje||[]).map(m=>`<div class="maridaje-pill"><span class="maridaje-icon">${MARIDAJE_ICON[m]||'•'}</span>${m}</div>`).join('');
  const perfilRows=w.perfil?Object.entries({Cuerpo:w.perfil.cuerpo,Frescura:w.perfil.frescura,Taninos:w.perfil.taninos}).map(([k,v])=>`
    <div class="perfil-row">
      <div class="perfil-label">${k}</div>
      <div class="perfil-bar-bg"><div class="perfil-bar-fill" style="width:${v/5*100}%"></div></div>
      <div class="perfil-val">${v}/5</div>
    </div>`).join(''):'';

  document.getElementById('fichaContent').innerHTML=`
    <div class="ficha-card">
      <div class="ficha-header">
        <div>
          <div class="fi-label" style="margin-bottom:6px">Ficha técnica</div>
          <div class="ficha-name">${w.nombre}</div>
          <div class="ficha-winery">${w.bodega}</div>
        </div>
        <div class="ficha-tipo-badge" style="background:${color}">${w.precio}</div>
      </div>
      <div class="ficha-note">${w.nota}</div>
      <div class="ficha-grid">
        ${[['Varietal',w.varietal],['Región',w.region],['Altitud',w.altitud],['Suelo',w.suelo],['Crianza',w.crianza],['Temperatura',w.temperatura]].map(([l,v])=>`
          <div class="ficha-item"><div class="fi-label">${l}</div><div class="fi-val">${v}</div></div>`).join('')}
      </div>
      ${w.perfil?`<div class="perfil-section"><div class="perfil-title">Perfil de sabor</div>${perfilRows}</div>`:''}
      ${w.maridaje&&w.maridaje.length?`<div class="maridaje-section"><div class="maridaje-title">Va bien con</div><div class="maridaje-pills">${maridajePills}</div></div>`:''}
      ${w.bodega_info?`<div class="bodega-section"><div class="bodega-label">Sobre la bodega y el terruño</div><div class="bodega-text">${w.bodega_info}</div></div>`:''}
      ${w.tienda_url?`
        <a href="${w.tienda_url}" target="_blank" rel="noopener" class="comprar-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          Comprá este vino en nuestra tienda
        </a>`:''}
    </div>`;
}

/* ── CHARCUTERÍA ── */
function renderCharc(items){
  document.getElementById('charcList').innerHTML=items.map(c=>`
    <div class="charc-item">
      <div><div class="charc-name">${c.nombre}</div><div class="charc-detail">${c.detalle}</div></div>
      <div class="charc-price">${c.precio}</div>
    </div>`).join('');
}

/* ── SOMMELIER ── */
const PREGUNTAS=[
  {
    id:'color',
    pregunta:'¿Qué Color te llama hoy?',
    sub:'Sin presiones, lo que más se te antoja.',
    opciones:[
      {val:'tinto',icon:'🍷',label:'Tinto',sub:'Con cuerpo y carácter'},
      {val:'blanco',icon:'🥂',label:'Blanco o Rosado',sub:'Fresco y liviano'},
      {val:'naranja',icon:'🫙',label:'Sorprendeme',sub:'Naranja, Pet Nat, Algo Distinto'}
    ]
  },
  {
    id:'estilo',
    pregunta:'¿Cómo lo querés?',
    sub:'Pensá en el estado de ánimo de esta noche.',
    opciones:[
      {val:'fresco',icon:'💧',label:'Fresco y Liviano',sub:'Que entre solo, sin pensar'},
      {val:'serio',icon:'🧱',label:'Con estructura',sub:'Algo que dure y se piense'},
      {val:'cualquiera',icon:'🎲',label:'Me quiero sorprender',sub:'Lo que mejor maride con algo'}
    ]
  },
  {
    id:'comida',
    pregunta:'¿Va con algo para comer?',
    sub:'Así encontramos el maridaje perfecto.',
    opciones:[
      {val:'Menu',icon:'🪵',label:'Tabla o charcutería',sub:'Quesos, jamón, fiambres'},
      {val:'solo',icon:'🍷',label:'Solo, por ahora',sub:'Degustare una copa'},
      {val:'carnes',icon:'🥩',label:'Algo más contundente',sub:'Carnes o quesos duros'}
    ]
  }
];

let sommAnswers={}, sommStep=0;

function initSommelier(){
  renderSommIntro();
}

function renderSommIntro(){
  document.getElementById('sommContent').innerHTML=`
    <div class="somm-intro">
      <div style="font-size:28px;margin-bottom:8px">🍾</div>
      <h3>Modo Sommelier</h3>
      <p>Tres preguntas rápidas y te recomendamos los vinos que mejor se adaptan a esta noche.</p>
      <button class="somm-start-btn" onclick="startSommelier()">Ayudame a elegir</button>
    </div>`;
}

function startSommelier(){
  sommAnswers={}; sommStep=0;
  renderSommStep(0);
}

function renderSommStep(step){
  const p=PREGUNTAS[step];
  const progressDots=PREGUNTAS.map((_,i)=>`<div class="somm-dot${i<step?' done':i===step?' active':''}"></div>`).join('');
  document.getElementById('sommContent').innerHTML=`
    <div class="somm-progress">${progressDots}</div>
    <div class="somm-step active">
      <div class="somm-question">${p.pregunta}</div>
      <div class="somm-sub">${p.sub}</div>
      <div class="somm-options">
        ${p.opciones.map(o=>`
          <div class="somm-opt" onclick="answerSomm('${p.id}','${o.val}')">
            <div class="somm-opt-icon">${o.icon}</div>
            <div>
              <div class="somm-opt-text">${o.label}</div>
              <div class="somm-opt-sub">${o.sub}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

function answerSomm(qid, val){
  sommAnswers[qid]=val;
  sommStep++;
  if(sommStep<PREGUNTAS.length){ renderSommStep(sommStep); }
  else { renderSommResults(); }
}

function renderSommResults(){
  const scored=wines.map(w=>{
    let score=0, reasons=[];
    const {color,estilo,comida}=sommAnswers;

    // color match
    if(color==='tinto'&&w.tipo==='Tinto'){score+=3;reasons.push('es tinto');}
    if(color==='blanco'&&(w.tipo==='Blanco'||w.tipo==='Rosado')){score+=3;reasons.push('es fresco y liviano');}
    if(color==='naranja'&&(w.tipo==='Naranja'||w.varietal.includes('ancestral')||w.varietal.includes('espumoso'))){score+=4;reasons.push('es una elección diferente');}
    if(color==='cualquiera'){score+=1;}

    // estilo match
    const cuerpo=w.perfil?w.perfil.cuerpo:3;
    const frescura=w.perfil?w.perfil.frescura:3;
    if(estilo==='fresco'&&frescura>=4){score+=3;reasons.push('entra fácil');}
    if(estilo==='serio'&&cuerpo>=4){score+=3;reasons.push('tiene estructura y cuerpo');}
    if(estilo==='cualquiera'){score+=1;}

    // comida match
    if(comida==='tabla'&&w.maridaje&&w.maridaje.includes('tabla')){score+=2;reasons.push('va perfecto con tabla');}
    if(comida==='carnes'&&w.maridaje&&w.maridaje.includes('carnes rojas')){score+=2;reasons.push('ideal para carnes');}
    if(comida==='solo'){score+=1;}

    // destacado bonus
    if(w.destacado) score+=1;

    return {...w, score, reasons};
  }).sort((a,b)=>b.score-a.score).slice(0,3);

  const rankColors=['#c8463a','#78716c','#a8a29e'];
  const rankLabel=['Ideal para vos','Segunda opción','También podría ser'];

  document.getElementById('sommContent').innerHTML=`
    <div class="somm-results" style="display:block">
      <h3>Tus vinos de esta noche</h3>
      <p>Basado en lo que nos dijiste</p>
      ${scored.map((w,i)=>`
        <div class="somm-result-card" onclick="selectWineFromSomm(${w.id})">
          <div class="src-header">
            <div class="src-rank" style="background:${rankColors[i]}">${i+1}</div>
            <div>
              <div class="src-name">${w.nombre}</div>
              <div class="src-why">${rankLabel[i]} · ${w.reasons.slice(0,2).join(', ')}</div>
            </div>
          </div>
          <div class="src-price">${w.precio} · ${w.copa}</div>
          <div class="src-maridaje">
            ${(w.maridaje||[]).slice(0,3).map(m=>`<div class="src-pill">${MARIDAJE_ICON[m]||''} ${m}</div>`).join('')}
          </div>
        </div>`).join('')}
      <button class="somm-restart" onclick="startSommelier()">Volver a empezar</button>
    </div>`;
}

function selectWineFromSomm(id){
  selectedId=id; buildMap(); renderWineList();
  renderFicha(wines.find(w=>w.id===id));
  showTab('ficha',document.querySelectorAll('.tab-btn')[1]);
}

/* ── TABS ── */
function showTab(name,btn){
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
}
</script>
